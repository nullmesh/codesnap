name: Release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  # 1) Maintain a "release PR" (version bump + CHANGELOG) from Conventional
  #    Commits. Merging that PR creates the GitHub release + tag.
  #    Uses RELEASE_TOKEN (a scoped PAT) because the org disables write access
  #    for the default GITHUB_TOKEN.
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          token: ${{ secrets.RELEASE_TOKEN }}

  # 2) When a release is cut, build the .vsix and publish it.
  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Package VSIX
        run: npx @vscode/vsce package
      - name: Publish to Open VSX (Cursor)
        run: npx ovsx publish *.vsix -p "$OVSX_PAT"
      - name: Publish to VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        run: npx @vscode/vsce publish --packagePath *.vsix -p "$VSCE_PAT"
      - name: Attach VSIX to GitHub release
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" *.vsix --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
