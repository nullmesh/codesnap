name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # Maintains a release PR; when merged it bumps the version, updates the
  # CHANGELOG, tags the commit, and creates a GitHub release.
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release

  # On release, build the VSIX and publish it.
  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
    env:
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Package VSIX
        run: npx @vscode/vsce package
      - name: Publish to Open VSX (Cursor)
        run: npx ovsx publish *.vsix -p "$OVSX_PAT"
      - name: Publish to VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        run: npx @vscode/vsce publish --packagePath *.vsix -p "$VSCE_PAT"
      - name: Attach VSIX to GitHub release
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" *.vsix --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
